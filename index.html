<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>換匯計算機</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="換匯計算機">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root { 
            --bg: #FFF9E1; --primary: #FF8C94; --secondary: #A8E6CF; 
            --text: #5D5D5D; --accent: #FFD3B6; --white: #FFFFFF;
        }

        * { box-sizing: border-box; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 10px 15px 70px 15px; overflow-x: hidden; }

        .app-header { font-size: 1.3rem; font-weight: 900; margin: 10px 0; color: var(--primary); text-align: center; }

        .card { 
            background: var(--white); padding: 15px; border-radius: 20px; 
            box-shadow: 0 5px 0px var(--accent); margin-bottom: 15px; border: 2px solid var(--accent);
        }

        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 4px; font-weight: bold; color: #AAA; }
        
        input, select { 
            width: 100%; padding: 10px; border: 2px solid #F5F5F5; 
            border-radius: 12px; font-size: 1rem; color: var(--text); background: #FAFAFA;
            -webkit-appearance: none;
        }
        select { background-image: url('data:image/svg+xml;utf8,<svg fill="%23FF8C94" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: right 10px center; }

        /* 調整按鈕位子：向上移動半行 */
        .rate-wrapper { display: flex; gap: 8px; align-items: flex-end; }
        .refresh-btn { 
            background: var(--secondary); border: none; border-radius: 10px; 
            padding: 8px 12px; font-size: 1rem; cursor: pointer;
            box-shadow: 0 3px 0px #8DD3B8;
            margin-bottom: 4px; /* 這裡微調向上 */
        }
        .refresh-btn:active { transform: translateY(2px); box-shadow: none; }

        .save-btn { 
            width: 100%; background: var(--primary); color: white; border: none; 
            padding: 12px; border-radius: 15px; font-weight: bold; font-size: 1rem; 
            margin-top: 5px; box-shadow: 0 4px 0px #E57373;
        }

        /* 歷史清單：修改為可編輯風格 */
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px dashed var(--accent); }
        .edit-input { 
            border: none; background: transparent; padding: 0; font-size: 0.95rem; 
            font-weight: bold; color: var(--text); width: 100%;
        }
        .edit-input:focus { outline: none; background: #FFF9E1; }
        .edit-loc { font-size: 0.75rem; color: #BBB; border: none; background: transparent; width: 100%; }
        .edit-time { border: none; background: transparent; font-size: 0.7rem; color: #CCC; width: 100%; }

        .item-price { font-size: 1rem; font-weight: 900; color: var(--primary); }
        .item-original { font-size: 0.7rem; color: #CCC; }
        .del-btn { background: #FFF0F0; border: none; color: var(--primary); border-radius: 50%; width: 28px; height: 28px; margin-left: 10px; font-size: 0.8rem; }

        /* 累積花費欄位再收窄 */
        .total-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--white); 
            padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-top: 2px solid var(--accent); border-radius: 20px 20px 0 0; z-index: 1000;
        }
        .total-amount { font-size: 1.2rem; font-weight: 900; color: var(--primary); }
    </style>
</head>
<body>

    <div class="app-header">✈️ 換匯計算機</div>

    <div class="card">
        <div class="input-group">
            <label>選擇幣別</label>
            <select id="currencySelect" onchange="changeCurrBySelect()">
                <option value="JPY" data-rate="0.215">日圓 JPY</option>
                <option value="USD" data-rate="32.5">美金 USD</option>
                <option value="KRW" data-rate="0.024">韓元 KRW</option>
            </select>
        </div>

        <div class="rate-wrapper">
            <div class="input-group" style="flex: 1;">
                <label>手動匯率</label>
                <input type="number" id="rate" step="0.0001" oninput="manualRateInput()">
            </div>
            <button class="refresh-btn" onclick="fetchRate()">🔄</button>
        </div>

        <div class="input-group">
            <label>金額 (<span id="currLabel">JPY</span>)</label>
            <input type="number" id="foreign" placeholder="0" oninput="calculate()">
        </div>

        <div class="input-group">
            <label>換算台幣 (TWD)</label>
            <input type="number" id="twd" readonly placeholder="＝ 等於">
        </div>

        <div style="display: flex; gap: 8px;">
            <div class="input-group" style="flex: 1;"><label>品名</label><input type="text" id="note" placeholder="買了什麼？"></div>
            <div class="input-group" style="flex: 1;"><label>地點</label><input type="text" id="locName" placeholder="哪家店？"></div>
        </div>

        <button class="save-btn" onclick="save()">把這筆記下來！ ✍️</button>
    </div>

    <div id="historyList"></div>

    <div class="total-bar">
        <span style="font-weight: bold; color: #AAA; font-size: 0.8rem;">累積花費</span>
        <span id="totalSum" class="total-amount">0</span>
    </div>

    <script>
        let history = JSON.parse(localStorage.getItem('ex_cute_v4') || '[]');
        let currentCurrency = localStorage.getItem('last_curr') || 'JPY';
        
        document.getElementById('locName').value = localStorage.getItem('last_loc') || '';
        document.getElementById('currencySelect').value = currentCurrency;
        document.getElementById('currLabel').innerText = currentCurrency;
        
        const savedRate = localStorage.getItem('manual_rate_' + currentCurrency);
        document.getElementById('rate').value = savedRate || 0.215;

        function calculate() {
            const r = document.getElementById('rate').value || 0;
            const f = document.getElementById('foreign').value || 0;
            document.getElementById('twd').value = Math.round(r * f);
        }

        function manualRateInput() {
            localStorage.setItem('manual_rate_' + currentCurrency, document.getElementById('rate').value);
            calculate();
        }

        function changeCurrBySelect() {
            const select = document.getElementById('currencySelect');
            currentCurrency = select.value;
            localStorage.setItem('last_curr', currentCurrency);
            document.getElementById('currLabel').innerText = currentCurrency;
            const r = localStorage.getItem('manual_rate_' + currentCurrency);
            document.getElementById('rate').value = r || select.options[select.selectedIndex].getAttribute('data-rate');
            calculate();
        }

        async function fetchRate() {
            const btn = document.querySelector('.refresh-btn');
            btn.innerText = "⏳";
            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/TWD`);
                const data = await res.json();
                const finalRate = (1 / data.rates[currentCurrency]).toFixed(4);
                document.getElementById('rate').value = finalRate;
                localStorage.setItem('manual_rate_' + currentCurrency, finalRate);
                calculate();
            } catch (e) { alert("網路異常"); }
            btn.innerText = "🔄";
        }

        function save() {
            const fAmount = document.getElementById('foreign').value;
            if (!fAmount) return;
            const loc = document.getElementById('locName').value;
            const record = {
                id: Date.now(),
                note: document.getElementById('note').value || '小東西',
                f: fAmount, curr: currentCurrency, t: document.getElementById('twd').value,
                time: new Date().toISOString().slice(0, 16),
                loc: loc
            };
            history.unshift(record);
            syncData();
            document.getElementById('note').value = '';
            document.getElementById('foreign').value = '';
            document.getElementById('twd').value = '';
        }

        // 修改現有紀錄的函數
        function updateRecord(id, field, value) {
            const index = history.findIndex(h => h.id === id);
            if (index !== -1) {
                history[index][field] = value;
                syncData();
            }
        }

        function deleteItem(id) {
            if (confirm("確定刪除嗎？")) {
                history = history.filter(h => h.id !== id);
                syncData();
            }
        }

        function syncData() {
            localStorage.setItem('ex_cute_v4', JSON.stringify(history));
            render();
        }

        function render() {
            const list = document.getElementById('historyList');
            let sum = 0;
            list.innerHTML = history.map(h => {
                sum += parseInt(h.t);
                // 邏輯修正：如果沒有地點且非編輯狀態，本來不顯示，但為了讓你可以事後「補填」，我們顯示一個透明的輸入框
                return `
                    <div class="history-item">
                        <div style="flex:1">
                            <input class="edit-input" value="${h.note}" onchange="updateRecord(${h.id}, 'note', this.value)">
                            ${h.loc || h.note === h.note ? `<input class="edit-loc" value="${h.loc}" placeholder="+ 新增地點" onchange="updateRecord(${h.id}, 'loc', this.value)">` : ''}
                            <input type="datetime-local" class="edit-time" value="${h.time}" onchange="updateRecord(${h.id}, 'time', this.value)">
                        </div>
                        <div style="text-align:right">
                            <div class="item-price">$${parseInt(h.t).toLocaleString()}</div>
                            <div class="item-original">${h.f} ${h.curr}</div>
                        </div>
                        <button class="del-btn" onclick="deleteItem(${h.id})">✕</button>
                    </div>`;
            }).join('');
            document.getElementById('totalSum').innerText = `TWD $${sum.toLocaleString()}`;
        }
        render();
    </script>
</body>
</html>
