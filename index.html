<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>換匯計算機</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="換匯計算機">
    <link rel="apple-touch-icon" href="icon.png">
    
    <style>
        :root { 
            --bg: #FFF9E1; --primary: #FF8C94; --secondary: #A8E6CF; 
            --text: #5D5D5D; --accent: #FFD3B6; --white: #FFFFFF; --grey: #F0F0F0;
        }

        * { box-sizing: border-box; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding: 10px 15px 70px 15px; overflow-x: hidden; }

        .app-header { font-size: 1.3rem; font-weight: 900; margin: 10px 0; color: var(--primary); text-align: center; }

        .card { 
            background: var(--white); padding: 15px; border-radius: 20px; 
            box-shadow: 0 5px 0px var(--accent); margin-bottom: 15px; border: 2px solid var(--accent);
        }

        .input-group { margin-bottom: 10px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 4px; font-weight: bold; color: #AAA; }
        
        input, select { 
            width: 100%; padding: 10px; border: 2px solid #F5F5F5; 
            border-radius: 12px; font-size: 1rem; color: var(--text); background: #FAFAFA;
            -webkit-appearance: none;
        }

        /* 匯率與按鈕平行方案 */
        .flex-container { display: flex; align-items: center; gap: 8px; }
        .refresh-btn { 
            background: var(--secondary); border: none; border-radius: 10px; 
            width: 42px; height: 42px; display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.2rem; cursor: pointer; box-shadow: 0 3px 0px #8DD3B8; flex-shrink: 0;
        }
        .refresh-btn:active { transform: translateY(2px); box-shadow: none; }

        /* 底部功能按鈕 */
        .action-btns { display: flex; gap: 10px; margin-top: 10px; }
        .clear-btn { 
            flex: 1; background: #EEE; color: #999; border: none; 
            padding: 12px; border-radius: 15px; font-weight: bold; font-size: 0.9rem;
            box-shadow: 0 4px 0px #DDD;
        }
        .save-btn { 
            flex: 2; background: var(--primary); color: white; border: none; 
            padding: 12px; border-radius: 15px; font-weight: bold; font-size: 1rem; 
            box-shadow: 0 4px 0px #E57373;
        }
        .clear-btn:active, .save-btn:active { transform: translateY(3px); box-shadow: none; }

        /* 歷史清單 */
        .history-item { padding: 12px 5px; border-bottom: 1px dashed var(--accent); }
        .display-mode .item-title { font-size: 0.95rem; font-weight: bold; }
        .display-mode .item-sub { font-size: 0.75rem; color: #BBB; margin-top: 2px; }
        .display-mode .item-price { font-size: 1rem; font-weight: 900; color: var(--primary); }
        
        .edit-mode input { margin-bottom: 5px; padding: 5px 8px; font-size: 0.85rem; border: 1px solid var(--accent); }
        .edit-actions { display: flex; gap: 5px; margin-top: 5px; }
        .mini-btn { padding: 5px 12px; border-radius: 8px; border: none; font-size: 0.75rem; font-weight: bold; }

        .btn-edit { background: #E1F5FE; color: #03A9F4; margin-right: 5px; }
        .btn-del { background: #FFF0F0; color: var(--primary); }
        .btn-save { background: var(--secondary); color: #555; }
        .btn-cancel { background: #EEE; color: #999; }

        .total-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: var(--white); 
            padding: 8px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-top: 2px solid var(--accent); border-radius: 20px 20px 0 0; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="app-header">✈️ 換匯計算機</div>

    <div class="card">
        <div class="input-group">
            <label>選擇幣別</label>
            <select id="currencySelect" onchange="changeCurrBySelect()">
                <option value="JPY" data-rate="0.1977">日圓 JPY</option>
                <option value="USD" data-rate="32.5">美金 USD</option>
                <option value="KRW" data-rate="0.024">韓元 KRW</option>
            </select>
        </div>

        <div class="input-group">
            <label>手動匯率</label>
            <div class="flex-container">
                <input type="number" id="rate" step="0.0001" oninput="manualRateInput()" style="flex: 1;">
                <button class="refresh-btn" onclick="fetchRate()">🔄</button>
            </div>
        </div>

        <div class="input-group">
            <label>外幣金額 (<span id="currLabel">JPY</span>)</label>
            <input type="number" id="foreign" placeholder="0" oninput="calculate()">
        </div>

        <div class="input-group">
            <label>換算台幣 (TWD) - 亦可輸入反推</label>
            <input type="number" id="twd" placeholder="0" oninput="calculateReverse()">
        </div>

        <div class="flex-container" style="margin-bottom: 10px;">
            <div style="flex: 1;"><label>品名</label><input type="text" id="note" placeholder="買了什麼？"></div>
            <div style="flex: 1;"><label>地點</label><input type="text" id="locName" placeholder="哪家店？"></div>
        </div>

        <div class="action-btns">
            <button class="clear-btn" onclick="resetForm()">全部清空</button>
            <button class="save-btn" onclick="save()">把這筆記下來！ ✍️</button>
        </div>
    </div>

    <div id="historyList"></div>

    <div class="total-bar">
        <span style="font-weight: bold; color: #AAA; font-size: 0.85rem;">累積花費</span>
        <span id="totalSum" style="font-size: 1.2rem; font-weight: 900; color: var(--primary);">0</span>
    </div>

    <script>
        const STORAGE_KEY = 'exchange_final_v1';
        let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        let currentCurrency = localStorage.getItem('last_curr') || 'JPY';
        let editingId = null;

        // 初始化
        document.getElementById('locName').value = localStorage.getItem('last_loc') || '';
        document.getElementById('currencySelect').value = currentCurrency;
        document.getElementById('currLabel').innerText = currentCurrency;
        const savedRate = localStorage.getItem('manual_rate_' + currentCurrency);
        document.getElementById('rate').value = savedRate || 0.1977;

        // 1. 正向換算 (外幣 -> 台幣)
        function calculate() {
            const r = document.getElementById('rate').value || 0;
            const f = document.getElementById('foreign').value || 0;
            document.getElementById('twd').value = Math.round(r * f) || "";
        }

        // 2. 反向換算 (台幣 -> 外幣)
        function calculateReverse() {
            const r = document.getElementById('rate').value || 0;
            const t = document.getElementById('twd').value || 0;
            if (r > 0) {
                // 回推外幣，取小數點兩位比較精確
                document.getElementById('foreign').value = (t / r).toFixed(2);
            }
        }

        // 3. 清空輸入框
        function resetForm() {
            document.getElementById('note').value = '';
            document.getElementById('foreign').value = '';
            document.getElementById('twd').value = '';
            document.getElementById('locName').value = '';
            localStorage.removeItem('last_loc'); // 連地點一起重設
        }

        function manualRateInput() {
            localStorage.setItem('manual_rate_' + currentCurrency, document.getElementById('rate').value);
            calculate();
        }

        function changeCurrBySelect() {
            const select = document.getElementById('currencySelect');
            currentCurrency = select.value;
            localStorage.setItem('last_curr', currentCurrency);
            document.getElementById('currLabel').innerText = currentCurrency;
            const r = localStorage.getItem('manual_rate_' + currentCurrency);
            document.getElementById('rate').value = r || select.options[select.selectedIndex].getAttribute('data-rate');
            calculate();
        }

        async function fetchRate() {
            const btn = document.querySelector('.refresh-btn');
            btn.innerText = "⏳";
            try {
                const res = await fetch(`https://open.er-api.com/v6/latest/TWD`);
                const data = await res.json();
                const finalRate = (1 / data.rates[currentCurrency]).toFixed(4);
                document.getElementById('rate').value = finalRate;
                localStorage.setItem('manual_rate_' + currentCurrency, finalRate);
                calculate();
            } catch (e) { alert("網路異常"); }
            btn.innerText = "🔄";
        }

        function save() {
            const fAmount = document.getElementById('foreign').value;
            if (!fAmount) return;
            const record = {
                id: Date.now(),
                note: document.getElementById('note').value || '小東西',
                f: fAmount,
                rate: document.getElementById('rate').value,
                curr: currentCurrency,
                t: document.getElementById('twd').value,
                time: new Date().toISOString().slice(0, 16),
                loc: document.getElementById('locName').value
            };
            history.unshift(record);
            syncData();
            // 儲存後只清空品名與金額，保留地點以便下一筆記錄（符合旅遊習慣）
            document.getElementById('note').value = '';
            document.getElementById('foreign').value = '';
            document.getElementById('twd').value = '';
        }

        function syncData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            render();
        }

        function toggleEdit(id) { editingId = (editingId === id) ? null : id; render(); }

        function saveEdit(id) {
            const index = history.findIndex(h => h.id === id);
            const newF = document.getElementById(`edit-f-${id}`).value;
            history[index].note = document.getElementById(`edit-note-${id}`).value;
            history[index].loc = document.getElementById(`edit-loc-${id}`).value;
            history[index].time = document.getElementById(`edit-time-${id}`).value;
            history[index].f = newF;
            history[index].t = Math.round(newF * history[index].rate);
            editingId = null;
            syncData();
        }

        function deleteItem(id) {
            if (confirm("確定刪除嗎？")) {
                history = history.filter(h => h.id !== id);
                syncData();
            }
        }

        function render() {
            const list = document.getElementById('historyList');
            let sum = 0;
            list.innerHTML = history.map(h => {
                sum += parseInt(h.t);
                if (editingId === h.id) {
                    return `<div class="history-item edit-mode">
                        <label>品名</label><input type="text" id="edit-note-${h.id}" value="${h.note}">
                        <label>地點</label><input type="text" id="edit-loc-${h.id}" value="${h.loc}">
                        <label>金額 (${h.curr})</label><input type="number" id="edit-f-${h.id}" value="${h.f}">
                        <label>時間</label><input type="datetime-local" id="edit-time-${h.id}" value="${h.time}">
                        <div class="edit-actions">
                            <button class="mini-btn btn-save" onclick="saveEdit(${h.id})">確認</button>
                            <button class="mini-btn btn-cancel" onclick="toggleEdit(null)">取消</button>
                        </div>
                    </div>`;
                } else {
                    return `<div class="history-item display-mode">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div style="flex:1">
                                <div class="item-title">${h.note}${h.loc ? `<span style="font-size:0.7rem; color:#CCC; font-weight:normal;"> @ ${h.loc}</span>` : ''}</div>
                                <div class="item-sub">${h.time.replace('T', ' ')}</div>
                                <div style="margin-top:5px;">
                                    <button class="mini-btn btn-edit" onclick="toggleEdit(${h.id})">✏️ 改</button>
                                    <button class="mini-btn btn-del" onclick="deleteItem(${h.id})">✕ 刪</button>
                                </div>
                            </div>
                            <div style="text-align:right">
                                <div class="item-price">$${parseInt(h.t).toLocaleString()}</div>
                                <div style="font-size:0.7rem; color:#CCC">${h.f} ${h.curr}</div>
                            </div>
                        </div>
                    </div>`;
                }
            }).join('');
            document.getElementById('totalSum').innerText = `TWD $${sum.toLocaleString()}`;
        }
        render();
    </script>
</body>
</html>
